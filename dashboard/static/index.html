<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Developer Farm Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #12161b;
        --panel-2: #181d24;
        --border: #28303a;
        --text: #e6edf3;
        --muted: #93a1b2;
        --accent: #4cc2ff;
        --good: #4ade80;
        --bad: #fb7185;
        --warn: #fbbf24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 28px; }
      .muted { color: var(--muted); }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid.cols-2 {
        grid-template-columns: 1fr 1fr;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      form {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      input, button, select {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      input { min-width: 260px; flex: 1; }
      button {
        cursor: pointer;
        background: var(--accent);
        color: #06131d;
        border: none;
        font-weight: 700;
      }
      button.secondary {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: var(--panel-2);
        border: 1px solid var(--border);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
      }
      .ok { background: var(--good); }
      .fail { background: var(--bad); }
      .warn { background: var(--warn); }
      .list {
        display: grid;
        gap: 8px;
      }
      .item {
        padding: 10px 12px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .events {
        max-height: 420px;
        overflow: auto;
      }
      .event {
        border-left: 3px solid var(--border);
        padding: 10px 12px;
      }
      .event.WorkerCompleted { border-left-color: var(--good); }
      .event.WorkerFailed { border-left-color: var(--bad); }
      .event.WorkerStarted { border-left-color: var(--accent); }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      .small { font-size: 12px; }
      @media (max-width: 900px) {
        .grid.cols-2 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap grid">
      <header>
        <h1>Developer Farm Dashboard</h1>
        <div class="row">
          <p class="muted">Live view over `dashboard.server` SSE + status endpoints.</p>
          <div class="status"><span id="sse-dot" class="dot warn"></span><span id="sse-label">Connecting SSE…</span></div>
        </div>
      </header>

      <section class="panel">
        <h2>Start pipeline</h2>
        <form id="start-form">
          <input id="user-spec" name="user_spec" value="work/mvp/user-spec.md" />
          <input id="feature-name" name="feature_name" value="default" />
          <button type="submit">Start</button>
          <button type="button" id="refresh-status" class="secondary">Refresh status</button>
        </form>
        <p id="start-result" class="muted small"></p>
      </section>

      <div class="grid cols-2">
        <section class="panel">
          <h2>Threads</h2>
          <div id="threads" class="list muted">Loading…</div>
        </section>

        <section class="panel">
          <h2>Event stream</h2>
          <div id="events" class="events list muted">Waiting for events…</div>
        </section>
      </div>
    </div>

    <script>
      const threadsEl = document.getElementById('threads');
      const eventsEl = document.getElementById('events');
      const startForm = document.getElementById('start-form');
      const startResult = document.getElementById('start-result');
      const refreshBtn = document.getElementById('refresh-status');
      const sseDot = document.getElementById('sse-dot');
      const sseLabel = document.getElementById('sse-label');

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function loadStatus() {
        const res = await fetch('/api/status');
        const data = await res.json();
        const threads = Object.entries(data.threads || {});
        if (!threads.length) {
          threadsEl.innerHTML = '<div class="item muted">No active threads yet.</div>';
          return;
        }
        threadsEl.innerHTML = threads.map(([id, info]) => {
          const status = escapeHtml(info.status || 'unknown');
          const started = info.started_at ? new Date(info.started_at * 1000).toLocaleString() : 'n/a';
          return `
            <div class="item">
              <div class="row">
                <strong class="mono">${escapeHtml(id)}</strong>
                <span class="status"><span class="dot ${status === 'completed' ? 'ok' : status === 'failed' ? 'fail' : 'warn'}"></span>${status}</span>
              </div>
              <div class="muted small">Started: ${escapeHtml(started)}</div>
            </div>`;
        }).join('');
      }

      function prependEvent(event) {
        const wrapper = document.createElement('div');
        wrapper.className = `item event ${event.type || ''}`;
        wrapper.innerHTML = `
          <div class="row">
            <strong>${escapeHtml(event.type || 'Event')}</strong>
            <span class="muted small mono">${escapeHtml(event.thread_id || '')}</span>
          </div>
          <div>${escapeHtml(event.msg || '')}</div>
          <div class="muted small mono">${new Date(event.ts || Date.now()).toLocaleTimeString()}</div>
        `;
        eventsEl.prepend(wrapper);
        while (eventsEl.children.length > 100) {
          eventsEl.removeChild(eventsEl.lastChild);
        }
      }

      function connectSSE() {
        const es = new EventSource('/api/events?thread_id=all');
        sseDot.className = 'dot warn';
        sseLabel.textContent = 'Connecting SSE…';

        es.onopen = () => {
          sseDot.className = 'dot ok';
          sseLabel.textContent = 'SSE connected';
        };

        es.onmessage = (evt) => {
          const data = JSON.parse(evt.data);
          if (data.type === 'heartbeat') return;
          prependEvent(data);
          loadStatus().catch(console.error);
        };

        es.onerror = () => {
          sseDot.className = 'dot fail';
          sseLabel.textContent = 'SSE disconnected — retrying on refresh';
          es.close();
        };
      }

      startForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          user_spec: document.getElementById('user-spec').value,
          feature_name: document.getElementById('feature-name').value,
        };
        startResult.textContent = 'Starting…';
        const res = await fetch('/api/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          startResult.textContent = data.error || 'Failed to start pipeline';
          return;
        }
        startResult.textContent = `Started thread ${data.thread_id}`;
        loadStatus().catch(console.error);
      });

      refreshBtn.addEventListener('click', () => loadStatus().catch(console.error));

      loadStatus().catch((err) => {
        threadsEl.innerHTML = `<div class="item">Failed to load status: ${escapeHtml(err)}</div>`;
      });
      connectSSE();
    </script>
  </body>
</html>
